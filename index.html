<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ujwal ☕</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        width: 90%;
        max-width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    p {
        font-size: 15px;
        color: #555;
    }

    .highlight {
        color: #ff4d6d;
        font-weight: bold;
    }

    .buttons {
        margin-top: 20px;
        display: flex;
        justify-content: space-around;
        position: relative;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        font-size: 14px;
        cursor: pointer;
    }

    #yesBtn {
        background: #ff4d6d;
        color: white;
    }

    #noBtn {
        background: #ccc;
        position: absolute;
        right: 0;
    }

    .message {
        margin-top: 20px;
        font-size: 18px;
        color: #ff4d6d;
        display: none;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Hey Ujwal 😊</h1>

    <p>
        I just wanted to say…<br>
        you’re <span class="highlight">really beautiful</span> ✨<br><br>
        and your smile honestly makes my day better 😌
    </p>

    <p>
        So… would you like to go for a coffee with me? ☕
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div class="message" id="message">
        Okay wow… you just made my day 😍☕
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    noBtn.addEventListener("touchstart", moveButton);
    noBtn.addEventListener("mouseover", moveButton);

    function moveButton() {
        const x = Math.random() * 200 - 100;
        const y = Math.random() * 100 - 50;
        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    yesBtn.onclick = () => {
        message.style.display = "block";
    };
</script>

</body>
</html>
